<!DOCTYPE html>
<html>
<head>
  <title>Decode</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #11998e, #38ef7d);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(0,0,0,0.3);
      color: white;
    }

    .nav-links a {
      margin-left: 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    /* CARD */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 85vh;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      color: white;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      background: #ff9a9e;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff6a88;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h3>🔐 Steganography</h3>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="encode.html">Encode</a>
    <a href="decode.html">Decode</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="card">
    <h2>Decode Message</h2>

    <input type="file" id="image">
    <input type="email" id="email" placeholder="Email">

    <button onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">

    <button onclick="decode()">Decode</button>

    <p id="result"></p>
  </div>
</div>

<script>
async function sendOTP() {
  const email = document.getElementById("email").value;

  const res = await fetch("http://localhost:3000/sendOTP", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email})
  });

  const data = await res.json();
  alert(data.message);
}

async function decode() {
  const formData = new FormData();
  formData.append("image", document.getElementById("image").files[0]);
  formData.append("otp", document.getElementById("otp").value);

  const res = await fetch("http://localhost:3000/decode", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if(data.status === "success"){
    document.getElementById("result").innerText =
      "Hidden Message: " + data.message;
  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>
